<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" role="img" aria-labelledby="title desc">
  <title id="title">Repositorios por visibilidad</title>
  <desc id="desc">Grafica donut con 196 repositorios: 17 publicos y 179 privados.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="public" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="private" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="520" height="360" rx="28" fill="url(#card)"/>
  <text x="34" y="52" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Repositorios</text>
  <text x="34" y="78" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Reparto manual por visibilidad</text>

  <g transform="translate(165 190) rotate(-90)" filter="url(#shadow)">
    <circle r="82" cx="0" cy="0" fill="none" stroke="#1e293b" stroke-width="34"/>
    <circle r="82" cx="0" cy="0" fill="none" stroke="url(#private)" stroke-width="34" stroke-linecap="round" stroke-dasharray="470.4 515.2" stroke-dashoffset="-44.8"/>
    <circle r="82" cx="0" cy="0" fill="none" stroke="url(#public)" stroke-width="34" stroke-linecap="round" stroke-dasharray="44.8 515.2" stroke-dashoffset="0"/>
  </g>

  <text x="165" y="178" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="900" text-anchor="middle">196</text>
  <text x="165" y="204" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">repositorios</text>

  <g transform="translate(315 135)">
    <rect x="0" y="0" width="170" height="72" rx="18" fill="#0f172a" opacity="0.72"/>
    <circle cx="22" cy="25" r="7" fill="url(#public)"/>
    <text x="42" y="30" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Publicos</text>
    <text x="42" y="56" fill="#38bdf8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900">17 - 8.7%</text>
  </g>

  <g transform="translate(315 222)">
    <rect x="0" y="0" width="170" height="72" rx="18" fill="#0f172a" opacity="0.72"/>
    <circle cx="22" cy="25" r="7" fill="url(#private)"/>
    <text x="42" y="30" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Privados</text>
    <text x="42" y="56" fill="#c084fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900">179 - 91.3%</text>
  </g>
</svg>
